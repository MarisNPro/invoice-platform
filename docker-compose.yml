name: invoice-platform

x-common-env: &common-env
  TZ: UTC

services:
  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      <<: *common-env
      POSTGRES_USER: invoice
      POSTGRES_PASSWORD: invoice
      POSTGRES_DB: invoice_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/prisma/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice -d invoice_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    environment:
      <<: *common-env
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Elasticsearch 8 ──────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    restart: unless-stopped
    environment:
      <<: *common-env
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      cluster.name: invoice-platform
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Keycloak 24 ──────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      <<: *common-env
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/invoice_platform
      KC_DB_USERNAME: invoice
      KC_DB_PASSWORD: invoice
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/realms:/opt/keycloak/data/import:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/health/ready"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── MinIO (S3-compatible) ─────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      <<: *common-env
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init (one-shot) ──────────────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-06-10T16-44-15Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/invoice-platform &&
        mc anonymous set none local/invoice-platform &&
        echo 'MinIO bucket ready.'
      "
    restart: "no"

  # ── MailHog (SMTP trap for local dev) ────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    environment:
      <<: *common-env
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── MCP Server ───────────────────────────────────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      NODE_ENV: development
      APP_BASE_URL: http://host.docker.internal:4000
      MCP_PORT: "4020"
      MCP_API_KEYS: "{}"
      MCP_DEV_KEY: "dev_mcp_local_key"
      MCP_DEV_ORG_ID: "00000000-0000-0000-0000-000000000001"
    ports:
      - "4021:4020"   # 4021 externally to avoid conflict with pnpm dev on 4020
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:4020/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── BullBoard (BullMQ dashboard) ──────────────────────────────────────────────
  bullboard:
    image: deadly0/bull-board:latest
    restart: unless-stopped
    environment:
      <<: *common-env
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PORT: "3100"
    ports:
      - "3100:3100"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:

networks:
  default:
    name: invoice-platform
