name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Shared across jobs
  NODE_VERSION: "22"
  PNPM_VERSION: "9.4.0"

# ── Job 1: Lint + Typecheck ─────────────────────────────────────────────────────
jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate (needed for API typecheck)
        run: pnpm --filter @invoice/api exec prisma generate --schema=./prisma/schema.prisma

      - name: Build workspace packages (needed before typechecking apps)
        run: |
          pnpm --filter @invoice/shared-types run build
          pnpm --filter @invoice/vat-engine   run build
          pnpm --filter @invoice/ubl-builder  run build
          pnpm --filter @invoice/en16931      run build
          pnpm --filter @invoice/i18n         run build
          pnpm --filter @invoice/ui           run build

      - name: Typecheck all packages
        run: pnpm turbo typecheck

# ── Job 2: Test (Postgres + Redis services) ─────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: invoice
          POSTGRES_PASSWORD: invoice
          POSTGRES_DB: invoice_platform_test
        options: >-
          --health-cmd "pg_isready -U invoice -d invoice_platform_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://invoice:invoice@localhost:5432/invoice_platform_test
      DIRECT_URL:   postgresql://invoice:invoice@localhost:5432/invoice_platform_test
      REDIS_URL:    redis://localhost:6379
      # Keycloak — guard is disabled in test env via SKIP_AUTH=true
      KEYCLOAK_URL:           http://localhost:8080
      KEYCLOAK_REALM:         invoice-platform
      KEYCLOAK_CLIENT_ID:     invoice-api
      KEYCLOAK_CLIENT_SECRET: test-secret
      NODE_ENV:               test

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @invoice/api exec prisma generate --schema=./prisma/schema.prisma

      - name: Apply database migrations
        run: |
          pnpm --filter @invoice/api exec \
            prisma migrate deploy --schema=./prisma/schema.prisma

      - name: Build packages (required for tests)
        run: |
          pnpm --filter @invoice/shared-types run build
          pnpm --filter @invoice/vat-engine   run build
          pnpm --filter @invoice/ubl-builder  run build
          pnpm --filter @invoice/en16931      run build
          pnpm --filter @invoice/i18n         run build

      - name: Run tests
        run: pnpm turbo test

# ── Job 3: Build and push API image → GHCR ─────────────────────────────────────
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/marisnpro/invoice-platform/invoice-api:latest

# ── Job 4: Build and push Worker image → GHCR ──────────────────────────────────
  build-worker:
    name: Build Worker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Worker
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ghcr.io/marisnpro/invoice-platform/invoice-worker:latest

# ── Job 5: Deploy web → Vercel ──────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web → Vercel
    runs-on: ubuntu-latest
    needs: [check, test]
    if: github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v5

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./apps/web
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            npm install -g vercel
            vercel --prod --token "$VERCEL_TOKEN" --yes
          else
            echo "VERCEL_TOKEN not set, skipping deploy"
          fi
